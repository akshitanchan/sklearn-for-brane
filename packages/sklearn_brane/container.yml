name: sklearn_brane
version: 1.0.0
kind: ecu

files:
  - sklearn_brane.py
  - run.py
  - report_template.html
  - requirements.txt
  - __init__.py

dependencies:
  - python3
  - python3-pip

install:
  - pip3 install -r requirements.txt

entrypoint:
  kind: task
  exec: run.py

actions:
  load_and_split:
    command:
      args:
        - load_and_split
    input:
      - name: filepath
        type: Data
      - name: target_col
        type: string
      - name: test_size
        type: string
    output:
      - name: result
        type: IntermediateResult

  scale_features:
    command:
      args:
        - scale_features
    input:
      - name: filepath
        type: IntermediateResult
      - name: method
        type: string
    output:
      - name: result
        type: IntermediateResult

  fit_model:
    command:
      args:
        - fit_model
    input:
      - name: filepath
        type: IntermediateResult
      - name: target_col
        type: string
      - name: model_name
        type: string
    output:
      - name: result
        type: IntermediateResult

  predict:
    command:
      args:
        - predict
    input:
      - name: model_data
        type: IntermediateResult
      - name: split_data
        type: IntermediateResult
    output:
      - name: result
        type: IntermediateResult

  evaluate:
    command:
      args:
        - evaluate
    input:
      - name: model_data
        type: IntermediateResult
      - name: split_data
        type: IntermediateResult
    output:
      - name: result
        type: IntermediateResult

  feature_importance:
    command:
      args:
        - feature_importance
    input:
      - name: model_data
        type: IntermediateResult
    output:
      - name: result
        type: IntermediateResult

  cross_validate:
    command:
      args:
        - cross_validate
    input:
      - name: data_path
        type: Data
      - name: target_col
        type: string
      - name: model_name
        type: string
      - name: cv
        type: string
    output:
      - name: result
        type: IntermediateResult

  plot_results:
    command:
      args:
        - plot_results
    input:
      - name: model_data
        type: IntermediateResult
      - name: split_data
        type: IntermediateResult
    output:
      - name: result
        type: IntermediateResult
