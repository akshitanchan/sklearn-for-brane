name: sklearn_brane
version: 1.0.11
kind: ecu

files:
  - sklearn_brane.py
  - run.py
  - requirements.txt
  - __init__.py

dependencies:
  - python3
  - python3-pip

install:
  - pip3 install scikit-learn==1.2.2 pandas==2.0.1 numpy==1.23.5 joblib==1.2.0 matplotlib==3.7.1 seaborn==0.12.2

entrypoint:
  kind: task
  exec: run.py

actions:
  load_and_split:
    command:
      args:
        - load_and_split
    input:
      - name: filepath
        type: Data
      - name: target_col
        type: string
      - name: test_size
        type: string
    output:
      - name: result
        type: IntermediateResult

  scale_features:
    command:
      args:
        - scale_features
    input:
      - name: filepath
        type: IntermediateResult
      - name: method
        type: string
    output:
      - name: result
        type: IntermediateResult

  impute_missing:
    command:
      args:
        - impute_missing
    input:
      - name: filepath
        type: IntermediateResult
      - name: strategy
        type: string
    output:
      - name: result
        type: IntermediateResult

  encode_labels:
    command:
      args:
        - encode_labels
    input:
      - name: filepath
        type: IntermediateResult
      - name: columns
        type: string
    output:
      - name: result
        type: IntermediateResult

  fit_model:
    command:
      args:
        - fit_model
    input:
      - name: filepath
        type: IntermediateResult
      - name: target_col
        type: string
      - name: model_name
        type: string
    output:
      - name: result
        type: IntermediateResult

  predict:
    command:
      args:
        - predict
    input:
      - name: model_data
        type: IntermediateResult
      - name: split_data
        type: IntermediateResult
    output:
      - name: result
        type: IntermediateResult

  evaluate:
    command:
      args:
        - evaluate
    input:
      - name: predictions
        type: IntermediateResult
      - name: split_data
        type: IntermediateResult
      - name: target_col
        type: string
    output:
      - name: output
        type: string

  feature_importance:
    command:
      args:
        - feature_importance
    input:
      - name: model_data
        type: IntermediateResult
    output:
      - name: output
        type: string

  cross_validate:
    command:
      args:
        - cross_validate
    input:
      - name: split_data
        type: IntermediateResult
      - name: target_col
        type: string
      - name: model_name
        type: string
      - name: n_folds
        type: string
    output:
      - name: output
        type: string

  plot_results:
    command:
      args:
        - plot_results
    input:
      - name: predictions
        type: IntermediateResult
      - name: model_data
        type: IntermediateResult
      - name: split_data
        type: IntermediateResult
      - name: target_col
        type: string
    output:
      - name: result
        type: IntermediateResult

  bundle_results:
    command:
      args:
        - bundle_results
    input:
      - name: rf_predictions
        type: IntermediateResult
      - name: rf_model_data
        type: IntermediateResult
      - name: lr_predictions
        type: IntermediateResult
      - name: lr_model_data
        type: IntermediateResult
      - name: dt_predictions
        type: IntermediateResult
      - name: dt_model_data
        type: IntermediateResult
      - name: split_data
        type: IntermediateResult
      - name: target_col
        type: string
    output:
      - name: result
        type: IntermediateResult
